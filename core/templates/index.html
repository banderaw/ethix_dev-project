<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ethix</title>
  </head>

  <body>
    <h1 class="text-5xl font-bold text-center text-sky-500 underline mt-12">
      my todo app
    </h1>

    <!-- CREATE TODO FORM -->
    <form
      action="{% url 'core:create_todo' %}"
      method="POST"
      class="w-1/3 mx-auto flex justify-center mt-20 my-10 gap-4"
    >
      {% csrf_token %}

      <input
        name="title"
        class="flex-1 text-lg text-blue-600 bg-gray-100 rounded-lg px-4 py-1 border border-2 border-sky-400"
        type="text"
        placeholder="add new todo"
      />

      <input type="hidden" name="description" value="No description" />

      <button class="bg-orange-500 px-6 py-2 rounded-xl font-bold text-lg">
        Add
      </button>
    </form>

    {% comment %} todos {% endcomment %}
    <div class="w-1/3 mx-auto">

      {% for t in todo_lists %}
      <div class="flex justify-between items-center mt-4 bg-sky-100 py-3 px-4 rounded-lg">

        <!-- LEFT: View -->
        <a href="{% url 'core:get_todo_by_id' t.id %}" class="flex gap-2 items-center">
          <input class="h-5 w-5" type="checkbox" />
          <p class="text-2xl font-medium">{{t.title}}-{{t.id}}</p>
        </a>

        <!-- RIGHT: Delete -->
        <form action="{% url 'core:todo_delete' t.id %}" method="POST">
          {% csrf_token %}
          <button class="bg-red-500 text-white px-3 py-1 rounded">
            Delete
          </button>
        </form>

      </div>
      {% endfor %}

    </div>
  </body>
</html>
